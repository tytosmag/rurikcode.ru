services:
  db:
    image: postgres:16-alpine
    container_name: rurik_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./auth-service
    container_name: rurik_auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    expose:
      - "3000"
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    command: sh -c "npm install && npm run migrate && npm run dev"

  leaderboard-service:
    build:
      context: ./leaderboard-service
    container_name: rurik_leaderboard
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - "3001"
    volumes:
      - ./leaderboard-service:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  client:
    build:
      context: ./client
    container_name: rurik_client
    restart: unless-stopped
    depends_on:
      - auth-service
    expose:
      - "5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  gateway:
    image: nginx:1.27-alpine
    container_name: rurik_gateway
    restart: unless-stopped
    depends_on:
      - client
      - auth-service
      - leaderboard-service
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data: