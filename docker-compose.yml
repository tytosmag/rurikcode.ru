services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    image: ${AUTH_SERVICE_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    expose:
      - "3000"
    command: sh -c "npm run migrate && npm start"

  leaderboard-service:
    image: ${LEADERBOARD_SERVICE_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_leaderboard
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    expose:
      - "3001"
    command: sh -c "npm run migrate && npm start"

  game-service:
    image: ${GAME_SERVICE_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_game
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - "3002"
    command: npm start

  client:
    image: ${CLIENT_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_client
    restart: unless-stopped
    depends_on:
      - auth-service
      - leaderboard-service
      - game-service
    expose:
      - "80"

  gateway:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_gateway
    restart: unless-stopped
    depends_on:
      - client
      - auth-service
      - leaderboard-service
      - game-service
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro

  alloy-agent:
    image: grafana/alloy:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_alloy_agent
    restart: unless-stopped
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=0.0.0.0:12345"
    environment:
      LOKI_URL: ${LOKI_URL}
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    profiles:
      - observability

  node_exporter:
    image: prom/node-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_node_exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro"
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    profiles:
      - observability

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "${DOCKER_ROOT_DIR:-/var/lib/docker}:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
    ports:
      - "${CADVISOR_PORT:-18080}:8080"
    profiles:
      - observability

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    profiles:
      - observability

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rurik}_nginx_exporter
    restart: unless-stopped
    command:
      - "-nginx.scrape-uri=http://gateway/stub_status"
    depends_on:
      - gateway
    ports:
      - "${NGINX_EXPORTER_PORT:-9113}:9113"
    profiles:
      - observability

volumes:
  postgres_data: