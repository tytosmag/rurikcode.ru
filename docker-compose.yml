services:
  db:
    image: postgres:16-alpine
    container_name: rurik_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./auth-service
    container_name: rurik_auth
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    command: sh -c "npm install && npm run migrate && npm run dev"

  client:
    build:
      context: ./client
    container_name: rurik_client
    restart: unless-stopped
    depends_on:
      - auth-service
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data: