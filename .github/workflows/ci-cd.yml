name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - develop
      - main

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.x
  CLIENT_ARTIFACT_NAME: client-dist-${{ github.sha }}

jobs:
  checks:
    name: JOB 1 — Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ─────────────────────────────────────────────
      # auth-service
      # ─────────────────────────────────────────────
      - name: Install auth-service dependencies
        working-directory: auth-service
        run: npm ci

      - name: Check auth-service scripts
        working-directory: auth-service
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      # ─────────────────────────────────────────────
      # leaderboard-service
      # ─────────────────────────────────────────────
      - name: Install leaderboard-service dependencies
        working-directory: leaderboard-service
        run: npm ci

      - name: Check leaderboard-service scripts
        working-directory: leaderboard-service
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      # ─────────────────────────────────────────────
      # game-service
      # ─────────────────────────────────────────────
      - name: Install game-service dependencies
        working-directory: game-service
        run: npm ci

      - name: Check game-service scripts
        working-directory: game-service
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      # ─────────────────────────────────────────────
      # client
      # ─────────────────────────────────────────────
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Check client scripts
        working-directory: client
        run: |
          npm run lint --if-present
          npm test --if-present

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BUILD_VERSION: ${{ github.sha }}

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_ARTIFACT_NAME }}
          path: client/dist/
          retention-days: 14
          if-no-files-found: error
  docker:
    name: JOB 2 — Docker build & push
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            context: ./auth-service
            dockerfile: ./auth-service/Dockerfile
            image: ghcr.io/${{ github.repository }}/auth-service
          - name: leaderboard-service
            context: ./leaderboard-service
            dockerfile: ./leaderboard-service/Dockerfile
            image: ghcr.io/${{ github.repository }}/leaderboard-service
          - name: game-service
            context: ./game-service
            dockerfile: ./game-service/Dockerfile
            image: ghcr.io/${{ github.repository }}/game-service
          - name: client
            context: ./client
            dockerfile: ./client/Dockerfile
            image: ghcr.io/${{ github.repository }}/client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.service.image }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=pr
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            NODE_ENV=production
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}