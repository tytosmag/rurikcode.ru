name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - develop
      - main

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.x
  CLIENT_ARTIFACT_NAME: client-dist-${{ github.sha }}

jobs:
  checks:
    name: JOB 1 — Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install auth-service dependencies
        working-directory: auth-service
        run: npm ci

      - name: Check auth-service scripts
        working-directory: auth-service
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      - name: Install leaderboard-service dependencies
        working-directory: leaderboard-service
        run: npm ci

      - name: Check leaderboard-service scripts
        working-directory: leaderboard-service
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      - name: Install game-service dependencies
        working-directory: game-service
        run: npm ci

      - name: Check game-service scripts
        working-directory: game-service
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Check client scripts
        working-directory: client
        run: |
          npm run lint --if-present
          npm test --if-present

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BUILD_VERSION: ${{ github.sha }}

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_ARTIFACT_NAME }}
          path: client/dist/
          retention-days: 14
          if-no-files-found: error

  docker:
    name: JOB 2 — Docker build & push
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            context: ./auth-service
            dockerfile: ./auth-service/Dockerfile
            image: ghcr.io/${{ github.repository }}/auth-service
          - name: leaderboard-service
            context: ./leaderboard-service
            dockerfile: ./leaderboard-service/Dockerfile
            image: ghcr.io/${{ github.repository }}/leaderboard-service
          - name: game-service
            context: ./game-service
            dockerfile: ./game-service/Dockerfile
            image: ghcr.io/${{ github.repository }}/game-service
          - name: client
            context: ./client
            dockerfile: ./client/Dockerfile
            image: ghcr.io/${{ github.repository }}/client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.service.image }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=pr
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            NODE_ENV=production
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  security:
    name: JOB 3 — Security scan
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - leaderboard-service
          - game-service
          - client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies for ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: npm audit for ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Scan for secrets with Trufflehog
        if: matrix.service == 'auth-service'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  codeql:
    name: JOB 3 — CodeQL analysis
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  deploy-staging:
    name: JOB 4 — Deploy to staging
    runs-on: ubuntu-latest
    needs:
      - docker
      - security
      - codeql

    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    timeout-minutes: 15

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.STAGING_APP_DIR }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="develop"

            echo "Login to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "Prepare staging directory..."
            mkdir -p "$APP_DIR"

            if [ -f "$APP_DIR/.env" ]; then
              echo "Backup existing .env..."
              cp "$APP_DIR/.env" /tmp/rurik-staging.env
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "No git repository found. Cloning $BRANCH into $APP_DIR..."

              TMP_DIR="${APP_DIR}.tmp"

              rm -rf "$TMP_DIR"
              git clone -b "$BRANCH" "$REPO_URL" "$TMP_DIR"

              if [ -f /tmp/rurik-staging.env ]; then
                cp /tmp/rurik-staging.env "$TMP_DIR/.env"
              fi

              rm -rf "$APP_DIR"
              mv "$TMP_DIR" "$APP_DIR"
            else
              echo "Git repository found. Updating $BRANCH..."

              cd "$APP_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"

              if [ -f /tmp/rurik-staging.env ]; then
                cp /tmp/rurik-staging.env "$APP_DIR/.env"
              fi
            fi

            echo "Go to staging directory..."
            cd "$APP_DIR"

            echo "Check compose config..."
            docker compose -f docker-compose.yml -f docker-compose.staging.yml config

            echo "Pull new images..."
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull

            echo "Start staging containers..."
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans

            echo "Cleanup old images..."
            docker image prune -f

      - name: Smoke test staging
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_URL }}/health")

            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed: HTTP $STATUS"
              exit 0
            fi

            echo "Attempt $i: HTTP $STATUS"
            sleep 5
          done

          echo "Staging health check failed"
          exit 1

  deploy-production:
    name: JOB 5 — Deploy to production
    runs-on: ubuntu-latest
    needs:
      - docker
      - security
      - codeql

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    timeout-minutes: 20

    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.PRODUCTION_APP_DIR }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="main"

            echo "Login to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "Prepare production directory..."
            mkdir -p "$APP_DIR"

            if [ -f "$APP_DIR/.env" ]; then
              echo "Backup existing .env..."
              cp "$APP_DIR/.env" /tmp/rurik-production.env
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "No git repository found. Cloning $BRANCH into $APP_DIR..."

              TMP_DIR="${APP_DIR}.tmp"

              rm -rf "$TMP_DIR"
              git clone -b "$BRANCH" "$REPO_URL" "$TMP_DIR"

              if [ -f /tmp/rurik-production.env ]; then
                cp /tmp/rurik-production.env "$TMP_DIR/.env"
              fi

              rm -rf "$APP_DIR"
              mv "$TMP_DIR" "$APP_DIR"
            else
              echo "Git repository found. Updating $BRANCH..."

              cd "$APP_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"

              if [ -f /tmp/rurik-production.env ]; then
                cp /tmp/rurik-production.env "$APP_DIR/.env"
              fi
            fi

            echo "Go to production directory..."
            cd "$APP_DIR"

            echo "Check compose config..."
            docker compose -f docker-compose.yml -f docker-compose.production.yml config

            echo "Pull new images..."
            docker compose -f docker-compose.yml -f docker-compose.production.yml pull

            echo "Start production containers..."
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --remove-orphans

            echo "Cleanup old images..."
            docker image prune -f

      - name: Smoke test production
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/health")

            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed: HTTP $STATUS"
              exit 0
            fi

            echo "Attempt $i: HTTP $STATUS"
            sleep 5
          done

          echo "Production health check failed"
          exit 1
