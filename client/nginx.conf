server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vite hashed assets: JS/CSS/fonts/images
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Static images from public/images
    location /images/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # Fonts from public/fonts
    location /fonts/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Game assets from public/game
    location /game/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # React Router SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}