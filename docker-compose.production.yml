services:
  db:
    container_name: rurik_production_db

  auth-service:
    image: ghcr.io/tytosmag/rurikcode.ru/auth-service:latest
    container_name: rurik_production_auth

  leaderboard-service:
    image: ghcr.io/tytosmag/rurikcode.ru/leaderboard-service:latest
    container_name: rurik_production_leaderboard

  game-service:
    image: ghcr.io/tytosmag/rurikcode.ru/game-service:latest
    container_name: rurik_production_game

  client:
    image: ghcr.io/tytosmag/rurikcode.ru/client:latest
    container_name: rurik_production_client

  gateway:
    container_name: rurik_production_gateway
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:80"

volumes:
  postgres_data:
    name: rurik_production_postgres_data